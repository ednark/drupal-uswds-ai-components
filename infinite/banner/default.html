<title>USWDS Banner (Drupal Theme Region)</title>
<script type="application/json" id="drupal-uswds-agent-meta">

  "drushCommands": ["drush theme:enable uswds"],
  "scssSettings": "$theme-banner-max-width, $theme-banner-background-color",
  "dependencies": ["uswds theme"],
