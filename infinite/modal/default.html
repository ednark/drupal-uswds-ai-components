<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Drupal implementation of USWDS Modal using paragraph bundle.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>USWDS Modal (Drupal Paragraph)</title>
<script type="application/json" id="drupal-uswds-agent-meta">
{
  "file": "modal/default.html",
  "title": "Modal (Drupal Paragraph Bundle)",
  "implementationType": "paragraph_bundle",
  "drupalModule": "uswds_paragraph_components",
  "uswdsComponent": "modal",
  "paragraphType": "uswds_modal",
  "complexity": "moderate",
  "drupalVersion": "^10.1 || ^11 || ^12",
  "useWhen": ["Dialog interactions in content", "Supplemental information that shouldn't need a full page", "Image or video lightboxes"],
  "avoidWhen": ["Form modals (use Drupal's modal API instead)", "Critical content that must always be visible"],
  "agentPrompt": "Enable uswds_paragraph_components_modal submodule. Editor creates a modal paragraph with trigger text, heading, and body content. USWDS JS handles open/close behavior.",
  "twigTemplate": "paragraph--uswds-modal.html.twig",
  "preprocessFunction": "uswds_paragraph_components_modal_preprocess_paragraph__uswds_modal()",
  "drushCommands": ["drush pm:enable uswds_paragraph_components_modal", "drush cache:rebuild"],
  "fieldDefinitions": {
    "field_uswds_modal_trigger": "Text for the button that opens the modal",
    "field_uswds_modal_heading": "Text for modal title",
    "field_uswds_modal_body": "Text formatted field for modal content"
  },
  "dependencies": ["uswds_paragraph_components", "paragraphs"],
  "editableAreas": ["Trigger button styling", "Modal width (default vs lg)", "Close button text"],
  "preserveElements": ["data-open-modal attribute on trigger", "usa-modal structure", "aria-labelledby and aria-describedby", "usa-modal__close button"],
  "knownLimitations": ["Requires USWDS JS for open/close", "Not integrated with Drupal's modal API", "Content inside modal is not lazy-loaded"],
  "tier": "curated",
  "tags": ["modal", "paragraph", "uswds_paragraph_components", "dialog", "overlay"]
}
</script>
</head>
<body>
<h1>USWDS Modal — Drupal Paragraph Bundle</h1>
<p>Provided by <code>uswds_paragraph_components_modal</code> submodule.</p>
<h2>Installation</h2>
<pre>drush pm:enable uswds_paragraph_components_modal</pre>
</body>
</html>
